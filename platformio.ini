[platformio]
default_envs = esp32s3-devkitc1-n8

[env]
build_unflags =
  -std=gnu++11
  -std=gnu++14
build_flags =
  -std=gnu++17
  -Wall
  -Wextra
lib_ldf_mode = chain+

[env:esp32s3-devkitc1-n8]
platform = espressif32@7.0.1
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_protocol = esptool
board_upload.flash_size = 8MB
build_flags =
  ${env.build_flags}
  -DGROWBOX_BOARD_PROFILE=\"esp32s3-devkitc1-n8\"
lib_deps =
  bblanchon/ArduinoJson@7.4.3

; Optional ESP32-S3-DevKitC-1-N32R16V profile: 32 MB octal flash and 16 MB
; octal PSRAM at 1.8 V. Verify the module marking before selecting this env.
[env:esp32s3-devkitc1-n32r16v]
extends = env:esp32s3-devkitc1-n8
board_build.arduino.memory_type = opi_opi
board_build.flash_mode = opi
board_build.partitions = large_fat_32MB.csv
board_upload.flash_size = 32MB
board_upload.maximum_size = 4718592
board_upload.before_reset = usb_reset
build_flags =
  ${env.build_flags}
  -DBOARD_HAS_PSRAM
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DGROWBOX_BOARD_PROFILE=\"esp32s3-devkitc1-n32r16v\"

[env:native]
platform = native@1.2.1
test_framework = unity
test_build_src = no
lib_compat_mode = off
