name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      PYTHONHASHSEED: "0"
      TF_DETERMINISTIC_OPS: "1"
      TF_CPP_MIN_LOG_LEVEL: "2"
      OMP_NUM_THREADS: "1"
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-lock.txt

      - name: Install pinned dependencies
        run: python -m pip install -r requirements-lock.txt

      - name: Verify dependency resolution
        run: python -m pip check

      - name: Run Python tests
        run: python -m pytest

      - name: Check generated schema header
        run: python tools/schema/generate_environment_schema.py --check

      - name: Run quick ML pipeline and check generated artifacts
        run: |
          python -m tools.ml.pipeline --quick --check-generated
          git diff --exit-code

      - name: Run portable C++ tests
        run: pio test -e native

      - name: Build ESP32-S3 N8 firmware
        run: pio run -e esp32s3-devkitc1-n8
