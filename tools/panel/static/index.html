<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Permissions-Policy" content="unload=(self)" />
  <title>Growbox ML — panel v2</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="stylesheet" href="/panel.css" />
</head>
<body>
  <header class="top-bar">
    <div class="card top-card">
      <div class="top-brand">
        <h1>Growbox ML</h1>
        <span id="top-status-badge" class="badge mono top-status-badge disconnected" aria-live="polite">podłącz płytkę</span>
        <div id="top-messages" class="top-messages" hidden aria-live="polite"></div>
      </div>
      <div class="top-connect">
        <div class="port-picker" id="port-picker">
          <button type="button" id="port-picker-trigger" class="port-picker-trigger" aria-haspopup="listbox" aria-expanded="false">
            <span id="port-picker-label" class="port-picker-label">—</span>
            <span class="port-picker-chevron" aria-hidden="true">▾</span>
          </button>
          <div id="port-picker-menu" class="port-picker-menu" role="listbox" hidden></div>
        </div>
        <button type="button" id="btn-refresh-ports" class="badge-btn ghost" data-ui="refresh">↻</button>
        <button type="button" class="badge-btn primary" data-ui="connect" id="btn-connect">Połącz</button>
        <button type="button" class="badge-btn danger" data-ui="disconnect" id="btn-disconnect">×</button>
      </div>
    </div>
  </header>

  <main>
    <section class="left-panel card-stack">
      <div class="card panel-toolbar" data-panel-toolbar id="panel-toolbar">
        <div class="card-head">
          <h2>Sterowanie</h2>
          <button type="button" class="help-btn" data-help="app" aria-label="Pomoc — panel">?</button>
        </div>
        <div class="compact-row">
          <div class="mini-cell toolbar-cell" aria-label="Scenariusz">
            <div class="head-row">
              <span class="name">Scenariusz</span>
              <span id="scenario-sync-badge" class="sync-badge unknown" hidden></span>
            </div>
            <div class="toolbar-btn-stack">
              <button type="button" class="badge-btn primary" data-ui="load" id="btn-load">Wyślij</button>
              <button type="button" class="badge-btn" data-ui="defaults" id="btn-defaults">Domyślne</button>
              <button type="button" class="badge-btn export-btn" id="btn-export" title="Pobierz scenariusz jako JSON">Pobierz</button>
            </div>
          </div>
          <div class="mini-cell toolbar-cell toolbar-cell-wide" aria-label="Praca">
            <div class="head-row"><span class="name">Praca</span></div>
            <div class="toolbar-btn-stack">
              <button type="button" class="badge-btn playpause-btn" data-ui="playpause" id="btn-playpause" data-cmd='{"command":"resume"}' aria-label="Start">
                <span class="playpause-icon" aria-hidden="true">▶</span>
              </button>
              <div class="toggle-group" role="group" aria-label="Tryb pracy">
                <button type="button" class="badge-btn" data-ui="mode-replay" data-cmd='{"command":"mode","value":"replay"}'>Replay</button>
                <button type="button" class="badge-btn" data-ui="mode-loop" data-cmd='{"command":"mode","value":"closed_loop"}'>Loop</button>
              </div>
              <button type="button" class="badge-btn primary" data-ui="step" id="btn-step">Krok</button>
            </div>
          </div>
          <div class="mini-cell toolbar-cell" aria-label="Diagnostyka">
            <div class="head-row"><span class="name">Diag.</span></div>
            <div class="toolbar-btn-stack">
              <button type="button" class="badge-btn" data-ui="status" data-cmd='{"command":"status"}'>Status</button>
              <button type="button" class="badge-btn" data-ui="reset" data-cmd='{"command":"reset"}'>Reset</button>
            </div>
          </div>
          <div class="mini-cell toolbar-cell toolbar-cell-seed" aria-label="Seed symulatora">
            <div class="head-row"><span class="name">Seed</span></div>
            <input type="number" id="seed" class="field-control" min="0" max="4294967295" step="1" value="101"
              title="Ziarno symulatora (0–4294967295) — wysyłane przy Wyślij" />
          </div>
        </div>
      </div>
      <div id="form-sections" class="card-stack"></div>
    </section>

    <section class="right-panel card-stack">
      <div class="card live-box">
        <div class="card-head live-head">
          <h2>Na żywo</h2>
          <div class="live-head-actions">
            <span id="live-step-badge" class="pill step-pill live-step-badge" hidden aria-live="polite">Krok 0</span>
            <button type="button" class="help-btn" data-help="live" aria-label="Pomoc — na żywo">?</button>
          </div>
        </div>
        <div id="decision-summary" class="live-summary note flush">Połącz → Wyślij → ▶ → Krok</div>
        <div class="outputs-legend" aria-label="Legenda pasków">
          <div class="legend-items">
            <span class="legend-item"><span class="legend-dot raw" aria-hidden="true"></span> Model — propozycja sieci</span>
            <span class="legend-item"><span class="legend-dot safe" aria-hidden="true"></span> Safety — wysyłane na płytkę</span>
          </div>
          <span id="live-inference-meta" class="legend-meta" hidden></span>
        </div>
        <div id="outputs-bars" class="outputs-empty">Uruchom <strong>Krok</strong>, aby zobaczyć wyjścia aktuatorów.</div>
        <div class="panel-actions btn-row" aria-label="Podgląd i konfiguracja">
          <button type="button" id="btn-panel-scenario" class="ghost panel-action-btn" data-panel-modal="scenario">Scenariusz</button>
          <button type="button" id="btn-panel-decision" class="ghost panel-action-btn" data-panel-modal="decision">Decyzja</button>
          <button type="button" id="btn-panel-history" class="ghost panel-action-btn" data-panel-modal="history">Historia</button>
          <button type="button" id="btn-panel-device" class="ghost panel-action-btn" data-panel-modal="device">Status</button>
          <button type="button" id="btn-panel-previous" class="ghost panel-action-btn" data-panel-modal="previous">Poprzedni</button>
          <button type="button" id="btn-panel-diagnostics" class="ghost panel-action-btn" data-panel-modal="diagnostics">Zasoby</button>
          <button type="button" id="btn-setup-growbox" class="ghost panel-action-btn" data-panel-modal="growbox">Growbox</button>
          <button type="button" id="btn-setup-safety" class="ghost panel-action-btn" data-panel-modal="safety">Safety</button>
        </div>
      </div>
    </section>
  </main>

  <div class="modal-backdrop" id="confirm-modal-backdrop" aria-hidden="true" inert>
    <div class="modal confirm-modal" role="alertdialog" aria-modal="true" aria-labelledby="confirm-modal-title">
      <div class="modal-head">
        <h3 id="confirm-modal-title">Potwierdź</h3>
      </div>
      <div class="modal-body confirm-modal-body" id="confirm-modal-content"></div>
      <div class="modal-foot">
        <button class="ghost" id="confirm-modal-cancel" type="button">Anuluj</button>
        <button class="primary" id="confirm-modal-ok" type="button">OK</button>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="notice-modal-backdrop" aria-hidden="true" inert>
    <div class="modal notice-modal" role="dialog" aria-modal="true" aria-labelledby="notice-modal-title">
      <div class="modal-head modal-chrome-head">
        <h3 id="notice-modal-title">Informacja</h3>
        <button type="button" class="ghost modal-head-close" id="notice-modal-close">Zamknij</button>
      </div>
      <div class="modal-body notice-modal-body" id="notice-modal-content"></div>
    </div>
  </div>

  <div class="modal-backdrop" id="help-modal-backdrop" aria-hidden="true" inert>
    <div class="modal help-modal" role="dialog" aria-modal="true" aria-labelledby="help-modal-title">
      <div class="modal-head modal-chrome-head">
        <h3 id="help-modal-title">Pomoc</h3>
        <button type="button" class="ghost modal-head-close" id="help-modal-close">Zamknij</button>
      </div>
      <div class="modal-body help-modal-body" id="help-modal-content"></div>
    </div>
  </div>

  <div class="modal-backdrop" id="modal-backdrop" aria-hidden="true" inert>
    <div class="modal modal--wide panel-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-head modal-chrome-head">
        <div class="modal-head-title-wrap">
          <h3 id="modal-title" tabindex="-1">Scenariusz</h3>
          <span id="modal-step-badge" class="pill step-pill live-step-badge modal-step-badge" hidden aria-live="polite">Krok 0</span>
        </div>
        <button type="button" class="ghost modal-head-close" id="modal-close">Zamknij</button>
      </div>
      <div class="modal-body panel-modal-body" id="panel-modal-body">
        <textarea id="modal-content" readonly></textarea>
        <div id="modal-content-panel" class="diag-modal-body" hidden></div>
        <div id="setup-pane-growbox" class="setup-pane" role="tabpanel" hidden></div>
        <div id="setup-pane-safety" class="setup-pane" role="tabpanel" hidden></div>
        <div id="setup-pane-previous" class="setup-pane" role="tabpanel" hidden></div>
      </div>
    </div>
  </div>

  <script src="/js/state.js"></script>
  <script src="/js/constants.js"></script>
  <script src="/js/util.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/scenario.js"></script>
  <script src="/js/form.js"></script>
  <script src="/js/dialogs.js"></script>
  <script src="/js/live.js"></script>
  <script src="/js/toolbar.js"></script>
  <script src="/js/diagnostics.js"></script>
  <script src="/js/modal.js"></script>
  <script src="/js/modal-window.js"></script>
  <script src="/js/device.js"></script>
  <script src="/js/main.js"></script>
</body>
</html>
