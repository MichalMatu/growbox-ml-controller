<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Permissions-Policy" content="unload=(self)" />
  <title>Growbox ML — panel v1</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <style>
    :root {
      --bg: #0f1419;
      --card: #1a2332;
      --border: #2d3a4f;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #3d8bfd;
      --ok: #3dd68c;
      --warn: #f5a524;
      --danger: #f2555a;
      --raw: #7eb6ff;
      --safe: #3dd68c;
      --panel-pad: 0.5rem;
      --card-gap: 0.4rem;
      --card-pad-y: 0.42rem;
      --card-pad-x: 0.52rem;
      --cell-gap: 0.3rem;
      --toolbar-h: 1.46rem;
      --toolbar-font: 0.62rem;
      --toolbar-pad-x: 0.38rem;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      line-height: 1.35;
    }
    h1 { margin: 0; font-size: 0.85rem; font-weight: 600; }
    .top-bar h1 { font-size: 0.74rem; }
    .sub { color: var(--muted); font-size: 0.72rem; }
    .top-bar {
      padding: var(--panel-pad) var(--panel-pad) 0;
      position: sticky;
      top: 0;
      z-index: 20;
      background: var(--bg);
    }
    .top-bar .card.top-card {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.22rem 0.32rem;
      margin-bottom: 0;
      padding: 0.28rem 0.38rem;
    }
    .top-brand {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      flex-shrink: 0;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 0.12rem 0.42rem;
      border-radius: 999px;
      font-size: 0.65rem;
      background: rgba(15, 20, 25, 0.55);
      border: 1px solid var(--border);
      color: var(--muted);
      white-space: nowrap;
    }
    .top-bar .badge {
      height: var(--toolbar-h);
      padding: 0 var(--toolbar-pad-x);
      font-size: var(--toolbar-font);
    }
    .badge.mono { font-family: ui-monospace, monospace; font-size: 0.62rem; }
    .top-bar .badge.mono { font-size: 0.58rem; }
    .top-connect {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.2rem;
      flex-shrink: 0;
      margin-left: auto;
    }
    .badge-btn {
      padding: 0.22rem 0.48rem;
      font-size: 0.68rem;
      border-radius: 999px;
      line-height: 1;
    }
    .top-bar .badge-btn {
      height: var(--toolbar-h);
      min-height: var(--toolbar-h);
      padding: 0 var(--toolbar-pad-x);
      font-size: var(--toolbar-font);
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .badge-btn.primary { background: var(--accent); color: #fff; border-color: #2f6fd1; }
    .badge-btn.danger {
      background: #4a2024;
      border-color: var(--danger);
      color: #ffd8da;
    }
    .top-bar .badge-btn.danger {
      width: var(--toolbar-h);
      min-width: var(--toolbar-h);
      padding: 0;
    }
    .badge-btn.state-on {
      background: rgba(61, 214, 140, 0.22);
      border-color: var(--ok);
      color: var(--ok);
      box-shadow: 0 0 0 1px rgba(61, 214, 140, 0.12);
    }
    .badge-btn.state-play {
      background: rgba(61, 214, 140, 0.24);
      border-color: var(--ok);
      color: var(--ok);
      box-shadow: 0 0 0 1px rgba(61, 214, 140, 0.18);
    }
    .badge-btn.state-stop {
      background: #5a2830;
      border-color: var(--danger);
      color: #ffd8da;
      box-shadow: 0 0 0 1px rgba(242, 85, 90, 0.22);
    }
    .badge-btn.state-on-warn {
      background: rgba(245, 165, 36, 0.2);
      border-color: var(--warn);
      color: var(--warn);
      box-shadow: 0 0 0 1px rgba(245, 165, 36, 0.12);
    }
    .badge-btn.state-on-accent {
      background: var(--accent);
      border-color: #2f6fd1;
      color: #fff;
      box-shadow: 0 0 0 1px rgba(61, 139, 253, 0.2);
    }
    .badge-btn.state-on-danger {
      background: #5a2830;
      border-color: var(--danger);
      color: #ffd8da;
      box-shadow: 0 0 0 1px rgba(242, 85, 90, 0.2);
    }
    .badge-btn.state-off { opacity: 0.45; }
    .badge-btn.state-disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .toggle-group {
      display: inline-flex;
      align-items: center;
      gap: 0.08rem;
      padding: 0.08rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(15, 20, 25, 0.45);
    }
    .toggle-group .badge-btn { margin: 0; }
    .top-bar .badge-btn.playpause-btn {
      width: var(--toolbar-h);
      min-width: var(--toolbar-h);
      padding: 0;
    }
    .top-bar .playpause-icon {
      font-size: 0.56rem;
      line-height: 1;
    }
    .badge-btn.state-error {
      border-color: var(--danger);
      color: #ffb4b6;
      box-shadow: 0 0 0 1px rgba(242, 85, 90, 0.35);
    }
    .top-bar #port-select {
      height: var(--toolbar-h);
      min-width: 100px;
      max-width: 128px;
      font-size: var(--toolbar-font);
      padding: 0 0.28rem;
    }
    main {
      display: grid;
      grid-template-columns: minmax(280px, 1.15fr) minmax(260px, 0.85fr);
      gap: var(--card-gap);
      padding: var(--card-gap) var(--panel-pad) var(--panel-pad);
      align-items: start;
    }
    @media (max-width: 900px) { main { grid-template-columns: 1fr; } }
    .panel-toolbar .compact-row { margin-top: 0; }
    .panel-toolbar .mini-cell.toolbar-cell {
      width: auto;
      min-width: 8.1rem;
    }
    .panel-toolbar .mini-cell.toolbar-cell-wide {
      min-width: 12.6rem;
    }
    .toolbar-btn-stack {
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      align-items: center;
      gap: 0.2rem;
      width: 100%;
      min-width: 0;
      min-height: 1.5rem;
    }
    .toolbar-btn-stack .badge-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 1 1 0;
      min-width: 0;
      max-width: 100%;
      height: 1.5rem;
      min-height: 1.5rem;
      box-sizing: border-box;
      font-size: 0.68rem;
      line-height: 1;
      padding: 0 0.28rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .toolbar-btn-stack .playpause-btn {
      flex: 0 0 1.5rem;
      width: 1.5rem;
      min-width: 1.5rem;
      max-width: 1.5rem;
      padding: 0;
      border-radius: 999px;
    }
    .toolbar-btn-stack .playpause-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.58rem;
      line-height: 1;
    }
    .toolbar-btn-stack .toggle-group {
      display: flex;
      align-items: stretch;
      flex: 1.4 1 0;
      min-width: 0;
      height: 1.5rem;
      box-sizing: border-box;
      gap: 0.06rem;
      padding: 0.05rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(15, 20, 25, 0.45);
    }
    .toolbar-btn-stack .toggle-group .badge-btn {
      flex: 1 1 0;
      min-width: 0;
      height: auto;
      min-height: 0;
      align-self: stretch;
      padding: 0 0.14rem;
      font-size: 0.62rem;
      border-radius: 999px;
    }
    .card-stack {
      display: flex;
      flex-direction: column;
      gap: var(--card-gap);
      min-width: 0;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: var(--card-pad-y) var(--card-pad-x);
      margin: 0;
    }
    .card h2 {
      margin: 0 0 0.35rem;
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
    }
    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.35rem;
      margin-bottom: 0.35rem;
    }
    .card-head h2, .card-head h3 {
      margin: 0;
      flex: 1 1 auto;
      min-width: 0;
    }
    .sub-card .card-head h3 {
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      font-weight: 600;
    }
    .help-btn {
      width: 1.15rem;
      height: 1.15rem;
      min-width: 1.15rem;
      padding: 0;
      border-radius: 50%;
      font-size: 0.62rem;
      font-weight: 700;
      line-height: 1;
      color: var(--muted);
      background: rgba(15, 20, 25, 0.55);
      border: 1px solid var(--border);
      cursor: pointer;
      flex-shrink: 0;
    }
    .help-btn:hover { color: var(--text); border-color: #3a4d68; }
    .top-bar .help-btn-top {
      width: var(--toolbar-h);
      min-width: var(--toolbar-h);
      height: var(--toolbar-h);
      border-radius: 50%;
      font-size: 0.68rem;
    }
    .row { display: flex; flex-wrap: wrap; gap: 0.35rem; align-items: center; }
    .btn-row button { padding: 0.28rem 0.5rem; font-size: 0.72rem; }
    label {
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
      font-size: 0.68rem;
      color: var(--muted);
      min-width: 0;
    }
    label span.lbl { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    input, select, button, textarea {
      font: inherit;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: #0f1419;
      color: var(--text);
      padding: 0.28rem 0.4rem;
      font-size: 0.75rem;
    }
    input[type="checkbox"] { width: 14px; height: 14px; margin: 0.15rem 0 0; padding: 0; }
    input[type="number"] {
      -moz-appearance: textfield;
      appearance: textfield;
    }
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    button { cursor: pointer; background: #243044; }
    button.primary { background: var(--accent); color: #fff; border-color: #2f6fd1; }
    button.ghost { background: transparent; border-color: var(--border); color: var(--muted); }
    button.danger { background: #4a2024; border-color: var(--danger); color: #ffd8da; }

    .section-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 0.2rem 0.3rem;
    }
    @media (max-width: 1100px) { .section-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 700px) { .section-grid { grid-template-columns: repeat(2, 1fr); } }
    label.field-num input, label.field-num select { width: 100%; max-width: 4.8rem; }
    label.field-wide input, label.field-wide select { max-width: 100%; }
    label.field-bool {
      flex-direction: row;
      align-items: center;
      gap: 0.2rem;
      justify-content: flex-start;
    }
    label.field-bool input[type="checkbox"] { margin: 0; flex-shrink: 0; }
    label.field-bool span.lbl { font-size: 0.65rem; }
    .compact-row {
      display: flex;
      flex-wrap: wrap;
      gap: var(--cell-gap);
      justify-content: flex-start;
      align-items: flex-start;
    }
    .mini-cell {
      display: flex;
      flex-direction: column;
      gap: 0.28rem;
      flex: 0 0 auto;
      width: 5.4rem;
      padding: 0.35rem 0.4rem 0.4rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: rgba(15, 20, 25, 0.35);
    }
    .mini-cell.wide { width: 6.6rem; }
    .mini-cell .head-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.35rem;
      min-width: 0;
    }
    .mini-cell .label-row {
      display: flex;
      justify-content: flex-start;
      min-width: 0;
    }
    .mini-cell .name {
      font-size: 0.62rem;
      color: var(--muted);
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: left;
    }
    .mini-cell .head-row .name { flex: 1 1 auto; }
    .mini-cell .head-row.tick-only { justify-content: flex-end; }
    .mini-cell .head-row input[type="checkbox"] {
      margin: 0;
      width: 13px;
      height: 13px;
      flex-shrink: 0;
    }
    .mini-cell input[type="number"],
    .mini-cell select {
      width: 100%;
      padding: 0.22rem 0.3rem;
      font-size: 0.72rem;
      border-color: #3a4d68;
      border-radius: 5px;
      border: 1px solid #3a4d68;
      background: #0f1419;
      color: var(--text);
    }
    .mini-cell.bool-only { justify-content: center; }
    .mini-cell.actuator-cell {
      width: 5.5rem;
      gap: 0.22rem;
    }
    .mini-cell.actuator-cell.wide { width: 6.8rem; }
    .mini-cell.actuator-cell .field-stack {
      display: flex;
      flex-direction: column;
      gap: 0.22rem;
    }

    .growbox-split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--cell-gap);
      align-items: stretch;
    }
    @media (max-width: 700px) { .growbox-split { grid-template-columns: 1fr; } }
    .sub-card {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.35rem 0.4rem;
      background: rgba(15, 20, 25, 0.35);
      min-width: 0;
    }
    .subhead {
      font-size: 0.62rem;
      color: var(--muted);
      grid-column: 1 / -1;
      margin-top: 0.15rem;
      opacity: 0.85;
    }
    .live-head-actions {
      display: flex;
      align-items: center;
      gap: 0.28rem;
      flex-shrink: 0;
    }
    .live-step-badge {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }
    .live-summary {
      margin: 0;
      font-size: 0.72rem;
    }
    .live-idle { margin: 0; }
    .live-data-table-wrap {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: rgba(15, 20, 25, 0.35);
    }
    .live-data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.68rem;
    }
    .live-data-table th,
    .live-data-table td {
      padding: 0.3rem 0.42rem;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    .live-data-table tbody tr:last-child th,
    .live-data-table tbody tr:last-child td { border-bottom: none; }
    .live-data-table thead th {
      font-size: 0.58rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
      background: rgba(15, 20, 25, 0.55);
    }
    .live-data-table tbody th {
      font-weight: 600;
      color: var(--muted);
      text-align: left;
      white-space: nowrap;
    }
    .live-data-table td.num {
      font-variant-numeric: tabular-nums;
      text-align: right;
      color: var(--text);
    }
    .live-data-table td.num strong { font-weight: 600; }
    .live-data-table tr.invalid th,
    .live-data-table tr.invalid td { opacity: 0.55; }
    .live-data-table tr.env-row th { font-style: normal; }
    .live-invalid {
      font-size: 0.62rem;
      color: var(--warn);
      margin-left: 0.12rem;
    }
    .outputs-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem 0.75rem;
      font-size: 0.64rem;
      color: var(--muted);
      margin-top: 0.35rem;
      padding: 0.28rem 0.38rem;
      background: rgba(15, 20, 25, 0.45);
      border-radius: 6px;
      border: 1px solid var(--border);
    }
    .legend-item { display: inline-flex; align-items: center; gap: 0.3rem; }
    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .legend-dot.raw { background: var(--raw); }
    .legend-dot.safe { background: var(--safe); }
    .actuator-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: var(--cell-gap);
      margin-top: 0.35rem;
    }
    .actuator-card {
      padding: 0.34rem 0.4rem;
      background: rgba(15, 20, 25, 0.45);
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .actuator-card.differs {
      border-color: rgba(245, 165, 36, 0.5);
      box-shadow: inset 0 0 0 1px rgba(245, 165, 36, 0.12);
    }
    .actuator-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.25rem;
      margin-bottom: 0.28rem;
    }
    .actuator-name {
      font-size: 0.72rem;
      font-weight: 600;
    }
    .actuator-diff {
      font-size: 0.58rem;
      color: var(--warn);
      font-weight: 600;
      letter-spacing: 0.03em;
    }
    .actuator-same {
      font-size: 0.58rem;
      color: var(--ok);
      font-weight: 500;
      opacity: 0.9;
    }
    .output-line {
      display: grid;
      grid-template-columns: 3.4rem 1fr 2.1rem;
      gap: 0.22rem;
      align-items: center;
      font-size: 0.66rem;
      margin-bottom: 0.14rem;
    }
    .output-line:last-child { margin-bottom: 0; }
    .lane-label {
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .output-line.model .lane-label { color: var(--raw); }
    .output-line.safety .lane-label { color: var(--safe); }
    .output-pct {
      text-align: right;
      font-variant-numeric: tabular-nums;
      color: var(--muted);
    }
    .bar {
      height: 8px;
      background: #0f1419;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .bar > span { display: block; height: 100%; }
    .bar.raw > span { background: var(--raw); }
    .bar.safe > span { background: var(--safe); }
    .outputs-empty {
      margin-top: 0.35rem;
      font-size: 0.68rem;
      color: var(--muted);
      padding: 0.45rem 0.5rem;
      border: 1px dashed var(--border);
      border-radius: 8px;
      text-align: center;
    }
    .safety-footer {
      margin-top: 0.4rem;
      padding: 0.34rem 0.42rem;
      background: rgba(15, 20, 25, 0.45);
      border-radius: 8px;
      border: 1px solid var(--border);
      font-size: 0.7rem;
      line-height: 1.4;
    }
    .safety-footer .safety-code {
      display: block;
      margin-top: 0.12rem;
      font-size: 0.62rem;
      color: var(--muted);
      opacity: 0.85;
    }
    .pill {
      display: inline-block;
      padding: 0.1rem 0.4rem;
      border-radius: 999px;
      font-size: 0.68rem;
      background: #243044;
      border: 1px solid var(--border);
    }
    .pill.warn { color: var(--warn); }
    .note { color: var(--muted); font-size: 0.72rem; margin: 0.3rem 0 0; }
    .note.flush { margin: 0; }
    .live-box { min-height: 120px; }
    .previous-live {
      margin-top: 0.42rem;
      padding-top: 0.38rem;
      border-top: 1px solid var(--border);
    }
    .previous-live-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.35rem;
      margin-bottom: 0.22rem;
    }
    .previous-live-head h3 {
      margin: 0;
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      font-weight: 600;
    }
    .previous-live-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 0.28rem;
    }
    .previous-live-item {
      padding: 0.28rem 0.34rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: rgba(15, 20, 25, 0.45);
      text-align: center;
    }
    .previous-live-label {
      display: block;
      font-size: 0.58rem;
      color: var(--muted);
      margin-bottom: 0.1rem;
    }
    .previous-live-pct {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--safe);
      font-variant-numeric: tabular-nums;
    }
    .json-actions { display: flex; flex-wrap: wrap; gap: var(--cell-gap); margin-top: 0.35rem; }

    body.modal-open {
      overflow: hidden;
      overscroll-behavior: none;
    }
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(8, 12, 18, 0.82);
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      overflow: hidden;
      overscroll-behavior: contain;
      touch-action: none;
    }
    .modal-backdrop.open { display: flex; }
    #help-modal-backdrop.open { z-index: 101; }
    .modal {
      width: min(720px, 100%);
      max-height: 85vh;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.55);
      touch-action: auto;
      overflow: hidden;
    }
    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      padding: 0.55rem 0.65rem;
      border-bottom: 1px solid var(--border);
    }
    .modal-head h3 { margin: 0; font-size: 0.82rem; }
    .modal-tabs { display: flex; gap: 0.25rem; flex-wrap: wrap; }
    .modal-tabs button.active { background: var(--accent); color: #fff; border-color: #2f6fd1; }
    .modal-body {
      padding: 0.55rem 0.65rem;
      overflow: auto;
      flex: 1;
    }
    .modal-body pre, .modal-body textarea {
      width: 100%;
      min-height: 320px;
      margin: 0;
      font-family: ui-monospace, monospace;
      font-size: 0.7rem;
      white-space: pre-wrap;
      word-break: break-word;
      resize: vertical;
    }
    .modal-foot {
      padding: 0.45rem 0.65rem;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 0.35rem;
      justify-content: flex-end;
    }
    .help-modal-body {
      font-size: 0.78rem;
      line-height: 1.45;
      color: var(--text);
    }
    .help-modal-body h4 {
      margin: 0.55rem 0 0.2rem;
      font-size: 0.68rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .help-modal-body h4:first-child { margin-top: 0; }
    .help-modal-body p { margin: 0.3rem 0; }
    .help-modal-body ul { margin: 0.2rem 0 0.45rem; padding-left: 1.1rem; }
    .help-modal-body li { margin: 0.15rem 0; }
    .help-modal-body code {
      font-family: ui-monospace, monospace;
      font-size: 0.72rem;
      color: var(--ok);
    }
  </style>
</head>
<body>
  <header class="top-bar">
    <div class="card top-card">
      <div class="top-brand">
        <h1>Growbox ML</h1>
      </div>
      <div class="top-connect">
        <select id="port-select"></select>
        <button type="button" id="btn-refresh-ports" class="badge-btn ghost" data-ui="refresh">↻</button>
        <button type="button" class="badge-btn primary" data-ui="connect" id="btn-connect">Połącz</button>
        <button type="button" class="badge-btn danger" data-ui="disconnect" id="btn-disconnect">×</button>
      </div>
    </div>
  </header>

  <main>
    <section class="left-panel card-stack">
      <div class="card panel-toolbar" data-panel-toolbar id="panel-toolbar">
        <div class="card-head">
          <h2>Sterowanie</h2>
          <button type="button" class="help-btn" data-help="app" aria-label="Pomoc — panel">?</button>
        </div>
        <div class="compact-row">
          <div class="mini-cell toolbar-cell" aria-label="Scenariusz">
            <div class="head-row"><span class="name">Scenariusz</span></div>
            <div class="toolbar-btn-stack">
              <button type="button" class="badge-btn primary" data-ui="load" id="btn-load">Wyślij</button>
              <button type="button" class="badge-btn" data-ui="defaults" id="btn-defaults">Domyślne</button>
            </div>
          </div>
          <div class="mini-cell toolbar-cell toolbar-cell-wide" aria-label="Praca">
            <div class="head-row"><span class="name">Praca</span></div>
            <div class="toolbar-btn-stack">
              <button type="button" class="badge-btn playpause-btn" data-ui="playpause" id="btn-playpause" data-cmd='{"command":"resume"}' aria-label="Start">
                <span class="playpause-icon" aria-hidden="true">▶</span>
              </button>
              <div class="toggle-group" role="group" aria-label="Tryb pracy">
                <button type="button" class="badge-btn" data-ui="mode-replay" data-cmd='{"command":"mode","value":"replay"}'>Replay</button>
                <button type="button" class="badge-btn" data-ui="mode-loop" data-cmd='{"command":"mode","value":"closed_loop"}'>Loop</button>
              </div>
              <button type="button" class="badge-btn primary" data-ui="step" id="btn-step">Krok</button>
            </div>
          </div>
          <div class="mini-cell toolbar-cell" aria-label="Diagnostyka">
            <div class="head-row"><span class="name">Diag.</span></div>
            <div class="toolbar-btn-stack">
              <button type="button" class="badge-btn" data-ui="status" data-cmd='{"command":"status"}'>Status</button>
              <button type="button" class="badge-btn" data-ui="reset" data-cmd='{"command":"reset"}'>Reset</button>
            </div>
          </div>
        </div>
      </div>
      <div id="form-sections" class="card-stack"></div>
    </section>

    <section class="right-panel card-stack">
      <div class="card live-box">
        <div class="card-head live-head">
          <h2>Na żywo</h2>
          <div class="live-head-actions">
            <span id="live-step-badge" class="pill step-pill live-step-badge" hidden aria-live="polite">Krok 0</span>
            <button type="button" class="help-btn" data-help="live" aria-label="Pomoc — na żywo">?</button>
          </div>
        </div>
        <div id="decision-summary" class="live-summary note flush">Połącz → Wyślij → ▶ → Krok</div>
        <div class="outputs-legend" aria-label="Legenda pasków">
          <span class="legend-item"><span class="legend-dot raw" aria-hidden="true"></span> Model — propozycja sieci</span>
          <span class="legend-item"><span class="legend-dot safe" aria-hidden="true"></span> Safety — wysyłane na płytkę</span>
        </div>
        <div id="outputs-bars" class="outputs-empty">Uruchom <strong>Krok</strong>, aby zobaczyć wyjścia aktuatorów.</div>
        <div class="safety-footer note flush" id="safety-reason" hidden></div>
        <div class="previous-live" id="previous-live-box">
          <div class="previous-live-head">
            <h3>Poprzedni stan aktuatorów</h3>
            <button type="button" class="help-btn" data-help="previous" aria-label="Pomoc — poprzedni stan">?</button>
          </div>
          <p class="note flush">Ostatnie wyjścia Safety — kontekst modelu przy następnym kroku.</p>
          <div id="previous-live" class="previous-live-grid" aria-live="polite"></div>
        </div>
        <div class="json-actions btn-row">
          <button id="btn-json-scenario" class="ghost">JSON scenariusza</button>
          <button id="btn-json-decision" class="ghost">JSON decyzji</button>
          <button id="btn-json-history" class="ghost">Historia</button>
          <button id="btn-json-device" class="ghost">Startup / status</button>
          <button id="btn-export" class="ghost">Pobierz scenariusz</button>
        </div>
      </div>
    </section>
  </main>

  <div class="modal-backdrop" id="help-modal-backdrop" aria-hidden="true" inert>
    <div class="modal help-modal" role="dialog" aria-modal="true" aria-labelledby="help-modal-title">
      <div class="modal-head">
        <h3 id="help-modal-title">Pomoc</h3>
        <button class="ghost" id="help-modal-close" type="button">Zamknij</button>
      </div>
      <div class="modal-body help-modal-body" id="help-modal-content"></div>
      <div class="modal-foot">
        <button class="primary" id="help-modal-close-2" type="button">OK</button>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="modal-backdrop" aria-hidden="true" inert>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-head">
        <h3 id="modal-title">JSON</h3>
        <div class="modal-tabs btn-row" id="modal-tabs"></div>
        <button class="ghost" id="modal-close" type="button">Zamknij</button>
      </div>
      <div class="modal-body">
        <textarea id="modal-content" readonly></textarea>
      </div>
      <div class="modal-foot">
        <button id="modal-copy" type="button">Kopiuj</button>
        <button class="primary" id="modal-close-2" type="button">OK</button>
      </div>
    </div>
  </div>

  <script>
    let panelSchema = null;
    let scenario = {};
    let lastDecision = null;
    let lastState = null;
    let deviceScenarioSynced = false;
    const SCENARIO_DRAFT_VERSION = 1;

    function scenarioStorageKey(schemaHash) {
      return `growbox-panel-scenario:${schemaHash}`;
    }

    function deepMergeScenario(base, overlay) {
      const merged = Array.isArray(base) ? [...base] : { ...base };
      for (const [key, value] of Object.entries(overlay || {})) {
        if (value !== null && typeof value === "object" && !Array.isArray(value)
            && merged[key] !== null && typeof merged[key] === "object" && !Array.isArray(merged[key])) {
          merged[key] = deepMergeScenario(merged[key], value);
        } else {
          merged[key] = value;
        }
      }
      return merged;
    }

    function saveScenarioDraft() {
      if (!panelSchema) return;
      try {
        localStorage.setItem(
          scenarioStorageKey(panelSchema.schema_hash),
          JSON.stringify({ v: SCENARIO_DRAFT_VERSION, scenario }),
        );
      } catch (_) { /* private mode / quota */ }
    }

    function loadScenarioDraft(schema) {
      try {
        const raw = localStorage.getItem(scenarioStorageKey(schema.schema_hash));
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        if (!parsed || parsed.v !== SCENARIO_DRAFT_VERSION || typeof parsed.scenario !== "object") {
          return null;
        }
        return sanitizeScenarioNumeric(deepMergeScenario(schema.default_scenario, parsed.scenario));
      } catch (_) {
        return null;
      }
    }

    function clearScenarioDraft() {
      if (!panelSchema) return;
      try {
        localStorage.removeItem(scenarioStorageKey(panelSchema.schema_hash));
      } catch (_) { /* ignore */ }
    }

    const modalViews = {
      scenario: { title: "Scenariusz (payload)", get: () => JSON.stringify(collectScenario(), null, 2) },
      decision: { title: "Ostatnia decyzja", get: () => lastDecision ? JSON.stringify(lastDecision, null, 2) : "Brak decyzji." },
      history: { title: "Historia serial", get: () => formatHistory(lastState) },
      device: { title: "Startup / status", get: () => formatDevice(lastState) },
    };
    let activeModal = "scenario";
    let modalReturnFocus = null;
    let helpReturnFocus = null;

    const HELP_TOPICS = {
      app: {
        title: "Panel — sterowanie",
        html: `
          <p>Panel wysyła scenariusz do firmware ESP32 i odczytuje decyzje modelu ML + warstwy safety.</p>

        html: `
          <p>Sześć wejść pomiarowych modelu v1. Wartości trafiają do <code>load_scenario</code> i kolejnych kroków.</p>

      },
      live: {

        html: `

          <p>Każdy aktuator ma <strong>dwa paski</strong>:</p>
          <ul>
            <li><strong>Model</strong> (niebieski) — co proponuje sieć neuronowa (0–100% mocy)</li>
            <li><strong>Safety</strong> (zielony) — co faktycznie idzie na płytkę po regułach bezpieczeństwa</li>
          </ul>
          <p>Pomarańczowa ramka i znak <strong>≠</strong> — tylko tam, gdzie safety <em>tego aktuatora</em> zmieniło wyjście modelu.</p>
          <p>Jeśli oba paski są takie same (np. fan 14% / 14%), karta ma etykietę <strong>bez zmian</strong> — safety przepuściło propozycję modelu.</p>
          <p>Na dole: czy safety coś zmieniło i dlaczego (np. próg ON/OFF, min. przerwa pompy, alarm temperatury).</p>
          <p>Przyciski JSON — surowe dane do debugowania i eksportu scenariusza.</p>
        `,
      },
    };

    const SAFETY_REASON_LABELS = {
      none: "Bez korekty — wyjścia modelu przeszły bez zmian",
      non_finite_input: "Nieprawidłowe dane wejściowe",
      model_failure: "Błąd modelu — wyjścia wyzerowane",
      schema_mismatch: "Niezgodność schematu danych",
      non_finite_model_output: "Nieprawidłowe wyjście modelu",
      output_clamped: "Wyjście obcięte do dozwolonego zakresu",
      temperature_unavailable: "Brak temperatury — grzałka wyłączona",
      actuator_unavailable: "Aktuator oznaczony jako niedostępny",
      over_temperature: "Za wysoka temperatura — grzałka zablokowana",
      temperature_alarm_fan: "Alarm temperatury — wymuszony min. wentylator",
      pump_pulse_limited: "Ograniczenie czasu impulsu pompy",
      pump_minimum_interval: "Za krótka przerwa między podlewaniem",
      binary_threshold: "Poniżej progu ON/OFF — urządzenie wyłączone",
      binary_minimum_on: "Min. czas włączenia — urządzenie pozostaje ON",
      binary_minimum_off: "Min. czas wyłączenia — urządzenie pozostaje OFF",
      invalid_capability: "Nieprawidłowa konfiguracja aktuatora",
      unknown: "Nieznany powód korekty safety",
    };

    function setNested(obj, path, value) {
      const parts = path.split(".");
      let cur = obj;
      for (let i = 0; i < parts.length - 1; i++) {
        if (typeof cur[parts[i]] !== "object" || cur[parts[i]] === null) cur[parts[i]] = {};
        cur = cur[parts[i]];
      }
      cur[parts[parts.length - 1]] = value;
    }

    function getNested(obj, path) {
      return path.split(".").reduce((acc, key) => (acc && acc[key] !== undefined ? acc[key] : undefined), obj);
    }

    const TOOLBAR_STATE_CLASSES = [
      "state-on", "state-on-warn", "state-on-accent", "state-on-danger",
      "state-play", "state-stop",
      "state-off", "state-disabled", "state-error",
    ];
    let lastRenderedDecisionStep = null;

    function friendlyError(message) {
      const map = {
        "serial port is not connected": "Brak połączenia — kliknij Połącz",
        "port must not be empty": "Wybierz port USB",
        "Failed to fetch": "Panel offline — uruchom: make panel",
      };
      return map[message] || message;
    }

    function toolbarBtn(ui) {
      return document.querySelector(`[data-panel-toolbar] [data-ui="${ui}"], .top-bar [data-ui="${ui}"]`);
    }

    function clearToolbarStates() {
      document.querySelectorAll("[data-panel-toolbar] .badge-btn[data-ui], .top-bar .badge-btn[data-ui]").forEach(btn => {
        btn.classList.remove(...TOOLBAR_STATE_CLASSES);
      });
    }

    function setToolbarBtn(ui, stateClass) {
      const btn = toolbarBtn(ui);
      if (btn) btn.classList.add(stateClass);
    }

    function setBtnHint(ui, title) {
      const btn = toolbarBtn(ui);
      if (btn) btn.title = title;
    }

    function resolvePaused(state) {
      if (state?.last_status?.paused !== undefined) {
        return Boolean(state.last_status.paused);
      }
      if (state?.connected && state?.last_decision) {
        return false;
      }
      return true;
    }

    function hasDeviceStatus(state) {
      return state?.last_status?.paused !== undefined && Boolean(state?.last_status?.mode);
    }

    function resolveMode(state) {
      if (state?.last_status?.mode) return state.last_status.mode;
      return "closed_loop";
    }

    function patchLocalTransportStatus(cmd) {
      if (!lastState) lastState = {};
      if (!lastState.last_status || typeof lastState.last_status !== "object") {
        lastState.last_status = {};
      }
      const status = lastState.last_status;
      if (cmd.command === "pause") status.paused = true;
      else if (cmd.command === "resume") status.paused = false;
      else if (cmd.command === "reset") {
        status.step = 0;
        status.paused = true;
      } else if (cmd.command === "load_scenario") {
        status.step = 0;
      } else if (cmd.command === "mode") {
        status.mode = cmd.value;
        if (cmd.value === "replay") status.paused = true;
      }
    }

    function updatePlayPauseBtn(paused, connected) {
      const btn = toolbarBtn("playpause");
      if (!btn) return;
      const icon = btn.querySelector(".playpause-icon");
      if (paused) {
        if (icon) icon.textContent = "▶";
        btn.dataset.cmd = '{"command":"resume"}';
        btn.setAttribute("aria-label", "Start");
        setBtnHint("playpause", connected ? "Start — wznów sterowanie" : "Najpierw Połącz urządzenie");
      } else {
        if (icon) icon.textContent = "■";
        btn.dataset.cmd = '{"command":"pause"}';
        btn.setAttribute("aria-label", "Stop");
        setBtnHint("playpause", connected ? "Stop — zatrzymaj sterowanie" : "Najpierw Połącz urządzenie");
      }
    }

    function updateToolbarState(state = lastState) {
      clearToolbarStates();
      const connected = Boolean(state?.connected);
      const mode = resolveMode(state);
      const paused = resolvePaused(state);

      if (connected) {
        setToolbarBtn("disconnect", "state-on-danger");
        setToolbarBtn("connect", "state-off");
        setBtnHint("disconnect", "Rozłącz port USB");
        setBtnHint("connect", "Połączono");

        setToolbarBtn("playpause", paused ? "state-play" : "state-stop");
        updatePlayPauseBtn(paused, true);

        if (mode === "replay") {
          setToolbarBtn("mode-replay", "state-on-accent");
          setBtnHint("mode-replay", "Tryb: REPLAY — ręcznie: Wyślij → ▶ → Krok");
          setBtnHint("mode-loop", "Przełącz na LOOP — automatyczne krokowanie");
        } else {
          setToolbarBtn("mode-loop", "state-on-accent");
          setBtnHint("mode-loop", "Tryb: LOOP — automatyczne kroki po Wyślij");
          setBtnHint("mode-replay", "Przełącz na REPLAY — krok po kroku ręcznie");
        }

        setBtnHint("reset", "Reset symulacji na urządzeniu");
        setBtnHint("status", "Odśwież status i scenariusz z płytki (nadpisuje formularz)");
        setBtnHint("load", "Wyślij cały scenariusz z formularza na płytkę");
        setBtnHint("step", "Jeden krok inferencji (najpierw Wyślij + ▶ w replay)");
        setBtnHint("defaults", "Przywróć domyślny scenariusz (czyści zapis w przeglądarce)");
      } else {
        setToolbarBtn("connect", "state-on-accent");
        setToolbarBtn("disconnect", "state-off");
        setBtnHint("connect", "Połącz z portem USB (usbmodem)");
        setBtnHint("disconnect", "Brak połączenia");
        updatePlayPauseBtn(true, false);
        document.querySelectorAll("[data-panel-toolbar] .badge-btn[data-ui]").forEach(btn => {
          btn.classList.add("state-disabled");
          btn.title = "Najpierw Połącz urządzenie";
        });
      }
    }

    function applyCommandOptimistic(cmdJson) {
      try {
        const cmd = JSON.parse(cmdJson);
        if (cmd.command === "pause" || cmd.command === "resume" || cmd.command === "mode") {
          patchLocalTransportStatus(cmd);
        } else if (cmd.command === "reset") {
          patchLocalTransportStatus(cmd);
          clearLivePreview(0);
        } else if (cmd.command === "load_scenario") {
          patchLocalTransportStatus(cmd);
          clearLivePreview(0);
        }
      } catch (_) { /* ignore */ }
      updateToolbarState(lastState);
    }

    async function runAction(fn, btn) {
      try {
        return await fn();
      } catch (err) {
        if (btn) {
          btn.classList.add("state-error");
          setTimeout(() => btn.classList.remove("state-error"), 1600);
        }
        throw err;
      }
    }

    async function api(path, options = {}) {
      let res;
      try {
        res = await fetch(path, {
          headers: { "Content-Type": "application/json" },
          ...options,
        });
      } catch (err) {
        throw new Error(friendlyError(err.message || "Failed to fetch"));
      }
      const data = await res.json();
      if (!res.ok) throw new Error(friendlyError(data.error || res.statusText));
      return data;
    }

    const LABEL_MAP = {

      air_leak_rate_ach: "Wyciek 1/h",
      pot_volume_l: "Don. L",
      substrate_water_capacity_ml: "Woda mL",
      transpiration_factor: "Transp.",
      heater_max_power_w: "W max",
      heater_efficiency: "η",
      heater_control_type: "typ",
      fan_max_airflow_m3_h: "m³/h",
      fan_minimum_command: "min",
      fan_control_type: "typ",
      humidifier_max_output_g_h: "g/h",
      humidifier_control_type: "typ",
      irrigation_control_type: "typ",
      irrigation_flow_ml_s: "mL/s",
      irrigation_maximum_pulse_s: "Impuls s",

      target_air_temperature_c: "T °C",
      target_air_humidity_pct: "Wilg %",

      target_soil_moisture_pct: "Gleba %",

      previous_irrigation: "Pompa",
    };

    const SENSOR_VALIDITY = [
      ["air_temperature_c", "air_temperature_c"],
      ["air_humidity_pct", "air_humidity_pct"],
      ["co2_ppm", "co2_ppm"],
      ["soil_moisture_pct", "soil_moisture_pct"],
      ["outside_temperature_c", "outside_temperature_c"],
      ["outside_humidity_pct", "outside_humidity_pct"],
    ];

    const LIVE_SENSOR_METRICS = [
      { key: "air_temperature_c", label: "Temp.", targetKey: "air_temperature_c", decimals: 1, unit: "°C" },
      { key: "air_humidity_pct", label: "Wilg.", targetKey: "air_humidity_pct", decimals: 0, unit: "%" },
      { key: "co2_ppm", label: "CO₂", targetKey: "co2_ppm", decimals: 0, unit: " ppm" },
      { key: "soil_moisture_pct", label: "Gleba", targetKey: "soil_moisture_pct", decimals: 0, unit: "%" },
      { key: "outside_temperature_c", label: "T zewn.", targetKey: null, decimals: 1, unit: "°C" },
      { key: "outside_humidity_pct", label: "Wilg. zewn.", targetKey: null, decimals: 0, unit: "%" },
    ];

    function formatLiveSensorValue(value, decimals) {
      if (typeof value !== "number" || !Number.isFinite(value)) return "—";
      return decimals > 0 ? value.toFixed(decimals) : String(Math.round(value));
    }

    function formatLiveTargetValue(value, decimals, unit) {
      if (typeof value !== "number" || !Number.isFinite(value)) return "—";
      const formatted = decimals > 0 ? value.toFixed(decimals) : String(Math.round(value));
      return `${formatted}${unit}`;
    }

    function setLiveStepBadge(step) {
      const el = document.getElementById("live-step-badge");
      if (!el) return;
      if (step === null || step === undefined) {
        el.hidden = true;
        return;
      }
      el.hidden = false;
      el.textContent = `Krok ${step}`;
    }

    function renderLiveMetricsTable(decision) {
      const sensors = decision?.sensors || {};
      const targets = decision?.targets || {};
      const validity = decision?.validity || {};
      const rows = LIVE_SENSOR_METRICS.map(metric => {
        const valueText = formatLiveSensorValue(sensors[metric.key], metric.decimals);
        const valid = validity[metric.key] !== false;
        const targetText = metric.targetKey
          ? formatLiveTargetValue(targets[metric.targetKey], metric.decimals, metric.unit)
          : "—";
        const invalidMark = valid ? "" : '<span class="live-invalid" title="Czujnik nieważny">⊘</span>';
        const envClass = metric.targetKey ? "" : " env-row";
        const invalidClass = valid ? "" : " invalid";
        return `<tr class="${envClass}${invalidClass}">
          <th scope="row">${metric.label}${invalidMark}</th>
          <td class="num"><strong>${valueText}${metric.unit}</strong></td>
          <td class="num">${targetText}</td>
        </tr>`;
      }).join("");
      return `<div class="live-data-table-wrap">
        <table class="live-data-table" aria-label="Czujniki i cele">
          <thead>
            <tr>
              <th scope="col">Czujnik</th>
              <th scope="col">Odczyt</th>
              <th scope="col">Cel</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
    }

    const ACTUATOR_GROUPS = [
      ["Grzałka", ["heater_available", "heater_max_power_w", "heater_efficiency", "heater_control_type"]],
      ["Fan", ["fan_available", "fan_max_airflow_m3_h", "fan_minimum_command", "fan_control_type"]],
      ["Nawilżacz", ["humidifier_available", "humidifier_max_output_g_h", "humidifier_control_type"]],
      ["Pompa", ["irrigation_available", "irrigation_flow_ml_s", "irrigation_maximum_pulse_s", "irrigation_minimum_interval_s", "irrigation_control_type"]],
    ];

    function isAvailabilityField(name) {
      return name.endsWith("_available");
    }

    const FIELD_HINTS = {
      irrigation_maximum_pulse_s: "Maks. czas jednego impulsu podlewania (sekundy)",
      irrigation_minimum_interval_s: "Min. przerwa między kolejnymi podlaniami (sekundy)",
      fan_minimum_command: "Min. PWM przy alarmie temperatury (nie przy normalnej pracy)",
      heater_control_type: "binary = przekaźnik, pwm = modulacja mocy",
      fan_control_type: "Typowo pwm (regulacja obrotów). binary = wł/wył",
      humidifier_control_type: "Typowo binary (wł/wył). pwm = modulacja",
      irrigation_control_type: "Typowo binary (impuls ON/OFF). pwm = długość impulsu z modelu",
    };

    function shortLabel(name) {
      return LABEL_MAP[name] || name.replace(/_/g, " ");
    }

    function fieldHint(name) {
      return FIELD_HINTS[name] || "";
    }

    function fieldByName(name) {
      for (const section of panelSchema.sections) {
        const hit = section.fields.find(f => f.name === name);
        if (hit) return hit;
      }
      return null;
    }

    function renderNumberField(field, extraClass = "field-num") {
      const id = `f-${field.path.replaceAll(".", "_")}`;
      const value = getNested(scenario, field.path);
      const step = fieldStep(field);
      const wide = field.path.includes("thermal_mass") || field.path.includes("substrate_water");
      const displayValue = formatFieldNumber(value ?? field.default, field.path);
      return `<label class="${wide ? "field-wide" : extraClass}">
        <span class="lbl">${shortLabel(field.name)}</span>
        <input type="number" data-path="${field.path}" id="${id}"
          min="${field.minimum}" max="${field.maximum}" step="${step}"
          value="${displayValue}" />
      </label>`;
    }

    function renderBoolField(field) {
      const id = `f-${field.path.replaceAll(".", "_")}`;
      const value = getNested(scenario, field.path);
      if (isAvailabilityField(field.name)) {
        return `<label class="field-bool">
          <input type="checkbox" data-path="${field.path}" id="${id}" ${value ? "checked" : ""} />
        </label>`;
      }
      return `<label class="field-bool">
        <input type="checkbox" data-path="${field.path}" id="${id}" ${value ? "checked" : ""} />
        <span class="lbl">${shortLabel(field.name)}</span>
      </label>`;
    }

    function renderEnumField(field) {
      const id = `f-${field.path.replaceAll(".", "_")}`;
      const value = getNested(scenario, field.path);
      const opts = (field.options || []).map(o =>
        `<option value="${o.value}" ${value === o.value ? "selected" : ""}>${o.value}</option>`
      ).join("");
      return `<label class="field-num">
        <span class="lbl">${shortLabel(field.name)}</span>
        <select data-path="${field.path}" id="${id}">${opts}</select>
      </label>`;
    }

    function renderField(field) {
      if (field.type === "boolean") return renderBoolField(field);
      if (field.type === "enum") return renderEnumField(field);
      return renderNumberField(field);
    }

    function renderHelpBtn(topic) {
      const meta = HELP_TOPICS[topic];
      const label = meta ? meta.title : "Pomoc";
      return `<button type="button" class="help-btn" data-help="${topic}" aria-label="Pomoc — ${label}">?</button>`;
    }

    function renderSectionHead(title, helpTopic, tag = "h2") {
      return `<div class="card-head"><${tag}>${title}</${tag}>${renderHelpBtn(helpTopic)}</div>`;
    }

    function updateModalLock() {
      const locked = document.querySelector(".modal-backdrop.open") !== null;
      document.body.classList.toggle("modal-open", locked);
    }

    function openHelp(topic) {
      const meta = HELP_TOPICS[topic];
      if (!meta) return;
      const backdrop = document.getElementById("help-modal-backdrop");
      helpReturnFocus = document.activeElement;
      document.getElementById("help-modal-title").textContent = meta.title;
      document.getElementById("help-modal-content").innerHTML = meta.html;
      backdrop.classList.add("open");
      backdrop.removeAttribute("inert");
      backdrop.setAttribute("aria-hidden", "false");
      updateModalLock();
      document.getElementById("help-modal-close").focus();
    }

    function closeHelp() {
      const backdrop = document.getElementById("help-modal-backdrop");
      const returnTo = helpReturnFocus;
      helpReturnFocus = null;
      const focused = document.activeElement;
      if (returnTo && typeof returnTo.focus === "function") {
        returnTo.focus();
      } else if (focused && backdrop.contains(focused) && typeof focused.blur === "function") {
        focused.blur();
      }
      backdrop.classList.remove("open");
      backdrop.setAttribute("inert", "");
      backdrop.setAttribute("aria-hidden", "true");
      updateModalLock();
    }

    function renderSensorBlock() {
      const rows = SENSOR_VALIDITY.map(([sensorKey, validityKey]) => {
        const sensorField = fieldByName(sensorKey);
        const sId = `f-sensors_${sensorKey}`;
        const vId = `f-validity_${validityKey}`;
        const sVal = getNested(scenario, `sensors.${sensorKey}`);
        const vVal = getNested(scenario, `validity.${validityKey}`);
        const sensorPath = `sensors.${sensorKey}`;
        const step = fieldStepForPath(sensorPath);
        const displayValue = formatFieldNumber(sVal ?? sensorField.default, sensorPath);
        return `<div class="mini-cell">
          <div class="head-row">
            <span class="name">${shortLabel(sensorKey)}</span>
            <input type="checkbox" data-path="validity.${validityKey}" id="${vId}" title="Czujnik ważny" ${vVal ? "checked" : ""} />
          </div>
          <input type="number" data-path="${sensorPath}" id="${sId}"
            min="${sensorField.minimum}" max="${sensorField.maximum}" step="${step}" value="${displayValue}" />
        </div>`;
      }).join("");
      const seedVal = scenario.seed ?? 101;
      const seedCell = `<div class="mini-cell">
          <div class="head-row">
            <span class="name">Seed</span>
          </div>
          <input type="number" id="seed" min="0" step="1" value="${seedVal}"
            title="Ziarno symulatora — wysyłane przy Wyślij" />
        </div>`;
      return `<div class="card">${renderSectionHead("Czujniki", "sensors")}<div class="compact-row sensor-grid">${rows}${seedCell}</div></div>`;
    }

    function isWideField(field) {
      return field.path.includes("thermal_mass") || field.path.includes("substrate_water")
        || field.path.includes("minimum_interval");
    }

    function fieldStep(field) {
      if (field.path.includes("pct") || field.path.includes("ratio")) return "0.1";
      if (field.path.includes("co2")) return "1";
      return "0.01";
    }

    function fieldStepForPath(path) {
      if (path.startsWith("sensors.")) {
        return path.includes("co2") ? "1" : "0.1";
      }
      if (path.startsWith("previous.")) return "0.001";
      if (path.includes("pct") || path.includes("ratio") || path.includes("efficiency") || path.includes("minimum_command") || path.includes("transpiration")) {
        return "0.01";
      }
      if (path.includes("co2")) return "1";
      if (path.includes("thermal_mass") || path.includes("substrate_water") || path.includes("minimum_interval")) return "1";
      return "0.01";
    }

    function decimalPlacesFromStep(step) {
      const text = String(step);
      const dot = text.indexOf(".");
      return dot < 0 ? 0 : text.length - dot - 1;
    }

    function normalizeFieldNumber(value, path) {
      if (typeof value !== "number" || !Number.isFinite(value)) return value;
      if (path === "seed") return Math.round(value);
      const decimals = decimalPlacesFromStep(fieldStepForPath(path));
      const factor = 10 ** decimals;
      return Math.round(value * factor) / factor;
    }

    function formatFieldNumber(value, path) {
      const normalized = normalizeFieldNumber(value, path);
      if (typeof normalized !== "number" || !Number.isFinite(normalized)) {
        return normalized ?? "";
      }
      const decimals = decimalPlacesFromStep(fieldStepForPath(path));
      if (decimals === 0) return String(normalized);
      return normalized.toFixed(decimals).replace(/(\.\d*?)0+$/, "$1").replace(/\.$/, "");
    }

    function sanitizeScenarioNumeric(obj, pathPrefix = "") {
      if (obj === null || typeof obj !== "object" || Array.isArray(obj)) return obj;
      const out = {};
      for (const [key, value] of Object.entries(obj)) {
        const path = pathPrefix ? `${pathPrefix}.${key}` : key;
        if (typeof value === "number") {
          out[key] = normalizeFieldNumber(value, path);
        } else if (typeof value === "object" && value !== null) {
          out[key] = sanitizeScenarioNumeric(value, path);
        } else {
          out[key] = value;
        }
      }
      return out;
    }

    function renderMiniCellInput(field) {
      const id = `f-${field.path.replaceAll(".", "_")}`;
      const value = getNested(scenario, field.path);
      const hint = fieldHint(field.name);
      const hintAttr = hint ? ` title="${hint}"` : "";
      const label = `<div class="label-row"><span class="name"${hint ? ` title="${hint}"` : ""}>${shortLabel(field.name)}</span></div>`;

      if (field.type === "enum") {
        const opts = (field.options || []).map(o =>
          `<option value="${o.value}" ${value === o.value ? "selected" : ""}>${o.value}</option>`
        ).join("");
        return `${label}<select data-path="${field.path}" id="${id}"${hintAttr}>${opts}</select>`;
      }
      const displayValue = formatFieldNumber(value ?? field.default, field.path);
      return `${label}<input type="number" data-path="${field.path}" id="${id}"${hintAttr}
        min="${field.minimum}" max="${field.maximum}" step="${fieldStep(field)}" value="${displayValue}" />`;
    }

    function renderMiniCell(field) {
      const wide = isWideField(field) ? " wide" : "";

      if (field.type === "boolean") {
        const id = `f-${field.path.replaceAll(".", "_")}`;
        const value = getNested(scenario, field.path);
        if (isAvailabilityField(field.name)) {
          return `<div class="mini-cell bool-only${wide}">
            <div class="head-row tick-only">
              <input type="checkbox" data-path="${field.path}" id="${id}" ${value ? "checked" : ""} />
            </div>
          </div>`;
        }
        return `<div class="mini-cell bool-only${wide}">
          <div class="head-row">
            <span class="name">${shortLabel(field.name)}</span>
            <input type="checkbox" data-path="${field.path}" id="${id}" ${value ? "checked" : ""} />
          </div>
        </div>`;
      }
      return `<div class="mini-cell${wide}">${renderMiniCellInput(field)}</div>`;
    }

    function renderCompactBlock(title, fields, helpTopic) {
      const cells = fields.map(renderMiniCell).join("");
      return `<div class="card">${renderSectionHead(title, helpTopic)}<div class="compact-row">${cells}</div></div>`;
    }

    function renderSubCard(title, fields, helpTopic) {
      const cells = fields.map(renderMiniCell).join("");
      return `<div class="sub-card">${renderSectionHead(title, helpTopic, "h3")}<div class="compact-row">${cells}</div></div>`;
    }

    function renderGrowboxPanel() {
      const env = panelSchema.sections.find(s => s.id === "environment");
      const cult = panelSchema.sections.find(s => s.id === "cultivation");
      if (!env && !cult) return "";
      const left = env ? renderSubCard(env.title, env.fields, "environment") : "";
      const right = cult ? renderSubCard(cult.title, cult.fields, "cultivation") : "";
      return `<div class="card growbox-panel"><div class="growbox-split">${left}${right}</div></div>`;
    }

    function renderActuatorGroupCell(title, names, byName) {
      const availableName = names.find(n => n.endsWith("_available"));
      const availableField = availableName ? byName[availableName] : null;
      const paramFields = names.filter(n => n !== availableName).map(n => byName[n]).filter(Boolean);
      const wide = paramFields.some(isWideField) ? " wide" : "";
      const availId = availableField ? `f-${availableField.path.replaceAll(".", "_")}` : "";
      const availVal = availableField ? getNested(scenario, availableField.path) : false;
      const stack = paramFields.map(renderMiniCellInput).join("");
      return `<div class="mini-cell actuator-cell${wide}">
        <div class="head-row">
          <span class="name">${title}</span>
          ${availableField ? `<input type="checkbox" data-path="${availableField.path}" id="${availId}" ${availVal ? "checked" : ""} />` : ""}
        </div>
        <div class="field-stack">${stack}</div>
      </div>`;
    }

    function renderActuatorBlock(section) {
      const byName = Object.fromEntries(section.fields.map(f => [f.name, f]));
      const cells = ACTUATOR_GROUPS.map(([title, names]) => renderActuatorGroupCell(title, names, byName)).join("");
      return `<div class="compact-row">${cells}</div>`;
    }

    function renderForm() {
      if (!panelSchema) return;
      const root = document.getElementById("form-sections");
      root.innerHTML = renderSensorBlock();
      root.innerHTML += renderGrowboxPanel();
      for (const section of panelSchema.sections) {
        if (section.id === "sensors" || section.id === "validity"
            || section.id === "environment" || section.id === "cultivation"
            || section.id === "previous") continue;
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `<h2>${section.title}</h2>`;
        if (section.id === "actuators") {
          root.innerHTML += `<div class="card">${renderSectionHead(section.title, "actuators")}${renderActuatorBlock(section)}</div>`;
        } else if (section.id === "targets") {
          root.innerHTML += renderCompactBlock(section.title, section.fields, "targets");
        } else {
          const grid = document.createElement("div");
          grid.className = "section-grid";
          grid.innerHTML = section.fields.map(renderField).join("");
          card.appendChild(grid);
          root.appendChild(card);
        }
      }
    }

    function collectScenario() {
      const next = {
        seed: Number(document.getElementById("seed").value || 101),
        previous: { ...(scenario.previous || { heater: 0, fan: 0, humidifier: 0, irrigation: 0 }) },
      };
      document.querySelectorAll("[data-path]").forEach(el => {
        const path = el.dataset.path;
        let value;
        if (el.type === "checkbox") value = el.checked;
        else if (el.tagName === "SELECT") value = el.value;
        else value = normalizeFieldNumber(Number(el.value), path);
        setNested(next, path, value);
      });
      scenario = sanitizeScenarioNumeric(next);
      saveScenarioDraft();
      return scenario;
    }

    function formatOutputPct(value) {
      const n = Number(value) || 0;
      return Math.min(100, Math.max(0, Math.round(n * 100)));
    }

    function renderActuatorCard(label, rawVal, safeVal) {
      const rPct = formatOutputPct(rawVal);
      const sPct = formatOutputPct(safeVal);
      const differs = Math.abs((Number(rawVal) || 0) - (Number(safeVal) || 0)) > 0.005;
      return `<article class="actuator-card${differs ? " differs" : ""}">
        <div class="actuator-head">
          <span class="actuator-name">${label}</span>
          ${differs
            ? '<span class="actuator-diff" title="Safety zmieniło wyjście tego aktuatora">≠</span>'
            : '<span class="actuator-same" title="Model i safety zgodne — bez korekty">bez zmian</span>'}
        </div>
        <div class="output-line model">
          <span class="lane-label">Model</span>
          <div class="bar raw" title="Propozycja modelu: ${rPct}%"><span style="width:${rPct}%"></span></div>
          <span class="output-pct">${rPct}%</span>
        </div>
        <div class="output-line safety">
          <span class="lane-label">Safety</span>
          <div class="bar safe" title="Wysyłane na płytkę: ${sPct}%"><span style="width:${sPct}%"></span></div>
          <span class="output-pct">${sPct}%</span>
        </div>
      </article>`;
    }

    const ACTUATOR_NAMES = ["heater", "fan", "humidifier", "irrigation"];
    const PREVIOUS_LABELS = {
      heater: "Grzałka",
      fan: "Fan",
      humidifier: "Nawilż.",
      irrigation: "Pompa",
    };

    function renderPreviousLive() {
      const el = document.getElementById("previous-live");
      if (!el) return;
      const prev = scenario.previous || { heater: 0, fan: 0, humidifier: 0, irrigation: 0 };
      el.innerHTML = ACTUATOR_NAMES.map(name => {
        const pct = formatOutputPct(prev[name]);
        return `<div class="previous-live-item">
          <span class="previous-live-label">${PREVIOUS_LABELS[name]}</span>
          <span class="previous-live-pct">${pct}%</span>
        </div>`;
      }).join("");
    }

    function syncPreviousActuators(safe) {
      if (!safe || typeof safe !== "object") return;
      if (!scenario.previous) scenario.previous = {};
      for (const name of ACTUATOR_NAMES) {
        scenario.previous[name] = Number(safe[name]) || 0;
      }
      renderPreviousLive();
      saveScenarioDraft();
    }

    function clearPreviousActuators() {
      syncPreviousActuators({ heater: 0, fan: 0, humidifier: 0, irrigation: 0 });
    }

    function clearLivePreview(step = 0) {
      lastRenderedDecisionStep = null;
      lastDecision = null;
      clearPreviousActuators();
      setLiveStepBadge(step);
      document.getElementById("decision-summary").innerHTML =
        `<p class="live-idle note flush">Symulacja zresetowana — uruchom <strong>Krok</strong> lub <strong>▶</strong></p>`;
      const outputsEl = document.getElementById("outputs-bars");
      outputsEl.className = "outputs-empty";
      outputsEl.innerHTML = "Uruchom <strong>Krok</strong>, aby zobaczyć wyjścia aktuatorów.";
      const safetyEl = document.getElementById("safety-reason");
      safetyEl.hidden = true;
      safetyEl.innerHTML = "";
    }

    function renderOutputs(decision) {
      const step = decision?.step;
      if (step !== undefined && step === lastRenderedDecisionStep) return;
      lastRenderedDecisionStep = step;
      lastDecision = decision;
      const names = ["heater", "fan", "humidifier", "irrigation"];
      const labels = { heater: "Grzałka", fan: "Fan", humidifier: "Nawilżacz", irrigation: "Pompa" };
      const raw = decision.raw_output || {};
      const safe = decision.safe_output || {};
      const outputsEl = document.getElementById("outputs-bars");
      outputsEl.className = "actuator-grid";
      outputsEl.innerHTML = names.map(name =>
        renderActuatorCard(labels[name], raw[name], safe[name])
      ).join("");

      setLiveStepBadge(decision.step ?? "?");
      document.getElementById("decision-summary").innerHTML = renderLiveMetricsTable(decision);

      const diag = decision.diagnostics || {};
      const reason = diag.safety_reason || "none";
      const reasonLabel = SAFETY_REASON_LABELS[reason] || SAFETY_REASON_LABELS.unknown;
      const modified = !!diag.safety_modified;
      const statusPill = modified
        ? '<span class="pill warn">Safety zmieniło wyjścia</span>'
        : '<span class="pill">Zgodne z modelem</span>';
      const reasonText = modified || reason !== "none"
        ? reasonLabel
        : "Safety nie zmieniło propozycji modelu.";
      const safetyEl = document.getElementById("safety-reason");
      safetyEl.hidden = false;
      safetyEl.innerHTML =
        `${statusPill} ${reasonText}` +
        `<span class="safety-code">Kod: <code>${reason}</code> · inferencja ${diag.inference_us ?? "?"} µs</span>`;
      syncPreviousActuators(safe);
    }

    function formatHistory(state) {
      if (!state?.history?.length) return "Brak historii.";
      return state.history.slice(0, 20).map(h =>
        `${h.direction}: ${JSON.stringify(h.payload)}`
      ).join("\n\n");
    }

    function formatDevice(state) {
      if (!state) return "Brak danych.";
      const parts = [];
      if (state.last_startup) parts.push("=== startup ===\n" + JSON.stringify(state.last_startup, null, 2));
      if (state.last_status) parts.push("=== status ===\n" + JSON.stringify(state.last_status, null, 2));
      if (state.last_firmware_error) parts.push("=== error ===\n" + JSON.stringify(state.last_firmware_error, null, 2));
      return parts.length ? parts.join("\n\n") : "Brak startup/status.";
    }

    function openModal(view) {
      activeModal = view;
      const backdrop = document.getElementById("modal-backdrop");
      modalReturnFocus = document.activeElement;
      backdrop.classList.add("open");
      backdrop.removeAttribute("inert");
      backdrop.setAttribute("aria-hidden", "false");
      updateModalLock();
      renderModalTabs();
      refreshModalContent();
      document.getElementById("modal-close").focus();
    }

    function closeModal() {
      const backdrop = document.getElementById("modal-backdrop");
      const returnTo = modalReturnFocus;
      modalReturnFocus = null;
      const focused = document.activeElement;
      if (returnTo && typeof returnTo.focus === "function") {
        returnTo.focus();
      } else if (focused && backdrop.contains(focused) && typeof focused.blur === "function") {
        focused.blur();
      }
      backdrop.classList.remove("open");
      backdrop.setAttribute("inert", "");
      backdrop.setAttribute("aria-hidden", "true");
      updateModalLock();
    }

    function renderModalTabs() {
      const tabs = document.getElementById("modal-tabs");
      tabs.innerHTML = Object.entries(modalViews).map(([key, meta]) =>
        `<button type="button" data-tab="${key}" class="${key === activeModal ? "active" : ""}">${meta.title.split(" ")[0]}</button>`
      ).join("");
      tabs.querySelectorAll("[data-tab]").forEach(btn => {
        btn.onclick = () => { activeModal = btn.dataset.tab; renderModalTabs(); refreshModalContent(); };
      });
    }

    function refreshModalContent() {
      const meta = modalViews[activeModal];
      document.getElementById("modal-title").textContent = meta.title;
      document.getElementById("modal-content").value = meta.get();
    }

    async function refreshPorts() {
      const data = await api("/api/ports");
      const select = document.getElementById("port-select");
      const prev = select.value;
      select.innerHTML = "";
      const ports = (data.ports || []).slice().sort((a, b) => {
        const score = (p) => (p.device.includes("usbmodem") ? 0 : p.device.includes("usbserial") ? 1 : 2);
        return score(a) - score(b);
      });
      for (const p of ports) {
        const opt = document.createElement("option");
        opt.value = p.device;
        opt.textContent = p.device.replace("/dev/cu.", "");
        select.appendChild(opt);
      }
      const preferred = ports.find(p => p.device.includes("usbmodem"));
      if (prev && ports.some(p => p.device === prev)) select.value = prev;
      else if (preferred) select.value = preferred.device;
    }

    async function refreshState(options = {}) {
      try {
        lastState = await api("/api/state");
      } catch (err) {
        setLiveStepBadge(null);
        document.getElementById("decision-summary").textContent = "Błąd API: " + err.message;
        return;
      }
      updateToolbarState(lastState);
      if (lastState.last_error) {
        const errBtn = lastState.connected ? toolbarBtn("disconnect") : toolbarBtn("connect");
        if (errBtn) {
          errBtn.classList.add("state-error");
          setTimeout(() => errBtn.classList.remove("state-error"), 1600);
        }
      }
      if (lastState.last_decision) {
        renderOutputs(lastState.last_decision);
      } else if (lastState.last_status?.step !== undefined) {
        clearLivePreview(lastState.last_status.step);
      }
      if (lastState.last_firmware_error) {
        document.getElementById("safety-reason").innerHTML =
          `<span class="pill warn">${lastState.last_firmware_error.code}</span> ${lastState.last_firmware_error.message || ""}`;
      }
      if (document.getElementById("modal-backdrop").classList.contains("open")) {
        refreshModalContent();
      }
    }

    function tryApplyScenarioFromDevice(state, { force = false } = {}) {
      const snap = state?.last_status?.scenario;
      if (!state?.connected || !snap || typeof snap !== "object") return false;
      if (!force && deviceScenarioSynced) return false;
      scenario = sanitizeScenarioNumeric(deepMergeScenario(panelSchema.default_scenario, {
        seed: state.last_status.seed ?? panelSchema.default_scenario.seed,
        sensors: snap.sensors,
        validity: snap.validity,
        environment: snap.environment,
        cultivation: snap.cultivation,
        actuators: snap.actuators,
        targets: snap.targets,
        previous: snap.previous,
      }));
      renderForm();
      renderPreviousLive();
      saveScenarioDraft();
      deviceScenarioSynced = true;
      return true;
    }

    async function requestDeviceStatus(maxAttempts = 10) {
      if (!lastState?.connected) return false;
      for (let attempt = 0; attempt < maxAttempts; attempt++) {
        await api("/api/command", { method: "POST", body: '{"command":"status"}' });
        await new Promise(resolve => setTimeout(resolve, 140));
        await refreshState();
        if (hasDeviceStatus(lastState)) return true;
      }
      return hasDeviceStatus(lastState);
    }

    async function requestDeviceScenario() {
      if (!lastState?.connected) return false;
      const ok = await requestDeviceStatus();
      updateToolbarState(lastState);
      if (!ok) return false;
      return tryApplyScenarioFromDevice(lastState, { force: true });
    }

    function bindFormSync() {
      const root = document.getElementById("form-sections");
      root.addEventListener("change", () => { collectScenario(); });
      root.addEventListener("input", (event) => {
        if (event.target && event.target.type === "number") collectScenario();
      });
    }

    async function init() {
      panelSchema = await api("/api/schema");
      await refreshPorts();
      await refreshState();
      if (lastState?.connected) {
        if (!await requestDeviceScenario()) {
          scenario = sanitizeScenarioNumeric(loadScenarioDraft(panelSchema) || panelSchema.default_scenario);
        }
      } else {
        scenario = sanitizeScenarioNumeric(loadScenarioDraft(panelSchema) || panelSchema.default_scenario);
      }
      renderForm();
      renderPreviousLive();
      bindFormSync();
      setInterval(() => refreshState(), 900);
      refreshState();
    }

    function bindToolbar() {
      document.addEventListener("click", async (event) => {
        const btn = event.target.closest("button");
        if (!btn) return;
        const scope = btn.closest("[data-panel-toolbar]") || btn.closest(".top-bar");
        if (!scope) return;

        if (btn.id === "btn-refresh-ports") {
          event.preventDefault();
          try { await runAction(refreshPorts, btn); } catch (_) { /* btn flash */ }
          return;
        }
        if (btn.id === "btn-connect") {
          event.preventDefault();
          try {
            deviceScenarioSynced = false;
            lastRenderedDecisionStep = null;
            await runAction(() => api("/api/connect", {
              method: "POST",
              body: JSON.stringify({
                port: document.getElementById("port-select").value,
                baud: 115200,
              }),
            }), btn);
            await refreshState();
            await requestDeviceScenario();
            updateToolbarState(lastState);
          } catch (_) { /* btn flash */ }
          return;
        }
        if (btn.id === "btn-disconnect") {
          event.preventDefault();
          try {
            await runAction(() => api("/api/disconnect", { method: "POST", body: "{}" }), btn);
            lastRenderedDecisionStep = null;
            deviceScenarioSynced = false;
            await refreshState();
          } catch (_) { /* btn flash */ }
          return;
        }
        if (btn.dataset.cmd) {
          event.preventDefault();
          if (btn.classList.contains("state-disabled")) return;
          try {
            await runAction(() => api("/api/command", {
              method: "POST",
              body: btn.dataset.cmd,
            }), btn);
            const cmdBody = btn.dataset.cmd;
            applyCommandOptimistic(cmdBody);
            updateToolbarState(lastState);
            setTimeout(async () => {
              await refreshState();
              if (cmdBody.includes('"status"')) {
                tryApplyScenarioFromDevice(lastState, { force: true });
              }
            }, 280);
          } catch (_) { /* btn flash */ }
          return;
        }
        if (btn.id === "btn-defaults") {
          event.preventDefault();
          try {
            await runAction(async () => {
              const data = await api("/api/defaults", {
                method: "POST",
                body: JSON.stringify({ seed: Number(document.getElementById("seed").value || 101) }),
              });
              scenario = sanitizeScenarioNumeric(data.scenario);
              if (!panelSchema) throw new Error("Schemat panelu niezaładowany — odśwież stronę");
              clearScenarioDraft();
              saveScenarioDraft();
              deviceScenarioSynced = false;
              renderForm();
              renderPreviousLive();
            }, btn);
          } catch (_) { /* btn flash */ }
          return;
        }
        if (btn.id === "btn-load") {
          event.preventDefault();
          if (btn.classList.contains("state-disabled")) return;
          try {
            await runAction(async () => {
              const payload = collectScenario();
              const { seed, ...body } = payload;
              await api("/api/load_scenario", {
                method: "POST",
                body: JSON.stringify({ seed, scenario: body }),
              });
            }, btn);
            clearLivePreview(0);
            setTimeout(refreshState, 300);
          } catch (_) { /* btn flash */ }
          return;
        }
        if (btn.id === "btn-step") {
          event.preventDefault();
          if (btn.classList.contains("state-disabled")) return;
          try {
            await runAction(async () => {
              collectScenario();
              await api("/api/step", { method: "POST", body: "{}" });
            }, btn);
            setTimeout(refreshState, 300);
          } catch (_) { /* btn flash */ }
        }
      });
    }
    bindToolbar();
    document.getElementById("btn-export").onclick = () => {
      const blob = new Blob([JSON.stringify(collectScenario(), null, 2)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "scenario.json";
      a.click();
    };
    document.getElementById("btn-json-scenario").onclick = () => { collectScenario(); openModal("scenario"); };
    document.getElementById("btn-json-decision").onclick = () => openModal("decision");
    document.getElementById("btn-json-history").onclick = () => openModal("history");
    document.getElementById("btn-json-device").onclick = () => openModal("device");
    document.getElementById("modal-close").onclick = closeModal;
    document.getElementById("modal-close-2").onclick = closeModal;
    document.getElementById("modal-backdrop").onclick = (e) => { if (e.target.id === "modal-backdrop") closeModal(); };
    document.addEventListener("click", (e) => {
      const btn = e.target.closest("[data-help]");
      if (!btn) return;
      e.preventDefault();
      openHelp(btn.dataset.help);
    });
    document.getElementById("help-modal-close").onclick = closeHelp;
    document.getElementById("help-modal-close-2").onclick = closeHelp;
    document.getElementById("help-modal-backdrop").onclick = (e) => {
      if (e.target.id === "help-modal-backdrop") closeHelp();
    };
    document.addEventListener("keydown", (e) => {
      if (e.key !== "Escape") return;
      if (document.getElementById("help-modal-backdrop").classList.contains("open")) closeHelp();
      else if (document.getElementById("modal-backdrop").classList.contains("open")) closeModal();
    });
    document.getElementById("modal-copy").onclick = async () => {
      await navigator.clipboard.writeText(document.getElementById("modal-content").value);
    };

    if (location.protocol === "file:") {
      setLiveStepBadge(null);
      document.getElementById("decision-summary").textContent =
        "Otwórz panel przez serwer: http://127.0.0.1:8765 (make panel)";
    }

    updateToolbarState({ connected: false });

    init().catch(err => {
      setLiveStepBadge(null);
      document.getElementById("decision-summary").textContent =
        "Błąd API: " + friendlyError(err.message);
    });
  </script>
</body>
</html>
